<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÇKA PO HAJMË SOT?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f6f3;
      --text: #111;
      --subtle: #999;
      --accent: #111;
      --line: #ddd;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      opacity: 0;
      transform: translateY(16px);
      animation: appear 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--subtle);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .name {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 200;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 28px;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-bottom: 20px;
    }

    .email-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text);
      flex-shrink: 0;
    }

    .email a {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: border-color 0.25s ease;
    }

    .email a:hover {
      border-color: var(--text);
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="tag">— Est. 2010</div>
    <div class="name">ÇKA PO<br>HAJMË SOT?</div>
    <div class="rule"></div>
    <div class="email-row">
      <div class="dot"></div>
      <div class="email">
        <a href="mailto:info@ckapohajmesot.com">info@ckapohajmesot.com</a>
      </div>
    </div>
  </div>
</body>
</html>
